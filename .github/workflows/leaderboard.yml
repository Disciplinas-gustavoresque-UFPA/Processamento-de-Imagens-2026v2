name: Atualizar Placar Semanal

on:
  schedule:
    # Roda todo Domingo às 23:55 UTC (aprox 20:55 no horário de Brasília)
    - cron: '55 23 * * 0'
  # Permite rodar manualmente para testes
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write # <-- Permissão explícita que faltava para abrir o PR
    env:
      # Força as actions a usarem o Node 24 e remove o warning
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Baixar o repositório
        uses: actions/checkout@v4 # Atualizado para remover o aviso do Node

      - name: Configurar Python
        uses: actions/setup-python@v5 # Atualizado para remover o aviso do Node
        with:
          python-version: '3.10'

      - name: Instalar dependências
        run: |
          pip install requests

      - name: Rodar o Script do Placar
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: python .github/scripts/gerar_placar.py

      - name: Commit e push do placar atualizado
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add README.md HISTORICO_PLACAR.md
          if git diff --cached --quiet; then
            echo "Nenhuma alteração no placar."
          else
            git commit -m "🤖 Robô do Placar: atualiza Hall da Fama"
            git push origin main
          fi